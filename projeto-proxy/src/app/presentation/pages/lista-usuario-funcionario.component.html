<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Nome</th>
      <th>CPF</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let usuario of usuarioFuncionarios | async">
      <td>{{ usuario.id }}</td>
      <td>{{ usuario.aln_nome }}</td>
      <td>{{ usuario.cpf }}</td>
    </tr>
  </tbody>
</table>
